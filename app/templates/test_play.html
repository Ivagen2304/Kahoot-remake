{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Гра почалась</title>
    <link rel="icon" href="https://assets-cdn.kahoot.it/controller/v2/favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Nunito', Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .question-section {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
            width: 100%;
        }

        #questionText {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-in;
        }

        #timer {
            font-size: 4rem;
            font-weight: bold;
            color: #ff6b6b;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            animation: pulse 1s infinite;
        }

        .answers-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            justify-items: stretch;
        }

        .answer-btn {
            width: 100%;
            padding: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .answer-btn:nth-child(1) {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
        }

        .answer-btn:nth-child(2) {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .answer-btn:nth-child(3) {
            background: linear-gradient(135deg, #ffe66d, #ffb347);
        }

        .answer-btn:nth-child(4) {
            background: linear-gradient(135deg, #a8e6cf, #52c234);
        }

        .answer-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        }

        .answer-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #waitingBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #waitingBox img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .waiting-text {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 30px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #answerCounter {
            margin-top: 20px;
            font-size: 1.8rem;
            opacity: 0.9;
        }

        #resultsBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .results-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .results-content h2 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 auto;
        }

        .results-table th,
        .results-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .results-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: bold;
        }

        .results-table td {
            color: #555;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            #questionText {
                font-size: 2rem;
                padding: 20px;
            }

            .answers-section {
                grid-template-columns: 1fr;
            }

            .answer-btn {
                padding: 20px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body data-code="{{ session.code }}">
    <div class="game-container">
        <div class="question-section">
            <div id="questionText"></div>
            <div id="timer"></div>
        </div>

        <div class="answers-section" id="answersBox"></div>
    </div>

    <div id="waitingBox">
        <img src="{% static 'waiting.gif' %}" alt="Waiting animation" />
        <div class="waiting-text">
            Чекаємо, поки інші гравці дадуть відповідь...
            <div id="answerCounter">0 / 0</div>
        </div>
    </div>

    <div id="resultsBox">
        <div class="results-content">
            <h2>Результати</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Гравець</th>
                        <th>Результат</th>
                    </tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
            <a href="/" style="display: inline-block; margin-top: 30px; background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; text-decoration: none; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2); transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">Повернутися на головну</a>
        </div>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const code = "{{ session.code }}";
    let storedName = sessionStorage.getItem("player_name") || localStorage.getItem("player_name");
    const playerName = (storedName && storedName !== "null") ? storedName : "Player";
    sessionStorage.setItem("player_name", playerName);

    let redirected = false;  // 👈 ФЛАГ
    let timerInterval;  // Для таймера
    let currentQuestionText = "";  // Для хранения текста вопроса

    const questionText = document.getElementById("questionText");
    const answersBox = document.getElementById("answersBox");
    const waitingBox = document.getElementById("waitingBox");
    const resultsBox = document.getElementById("resultsBox");
    const resultsTable = document.getElementById("resultsTable");
    const timerDisplay = document.getElementById("timer");

    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/game/" + code + "/?name=" + encodeURIComponent(playerName) + "&role=player"
    );

    socket.onopen = () => {
        console.log("Socket opened on game page");
        // 👇 ЗАПРОСИ ТЕКУЩИЙ ВОПРОС
        socket.send(JSON.stringify({
            type: "get_current_question"
        }));
    };

    socket.onmessage = (event) => {
        console.log("WebSocket connected");
        const data = JSON.parse(event.data);
        console.log(data);

        if (data.type === "question") {
             // Показати питання
            const questionText = document.getElementById("questionText");
            currentQuestionText = data.question;
            questionText.innerText = data.question;

            // Показати кнопки відповідей
            const answersBox = document.getElementById("answersBox");
            answersBox.innerHTML = ""; // очищаємо старі кнопки

            data.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.innerText = option.text;
                btn.className = "answer-btn";

                // При натисканні на кнопку — відправляємо відповідь
                btn.onclick = () => sendAnswer(option.id);

                answersBox.appendChild(btn);
            });

            // Показати блоки питання і відповідей
            answersBox.style.display = "grid";
            document.querySelector('.question-section').style.display = "block";

            // Запустить таймер
            if (data.time_limit) {
                startTimer(data.time_limit);
            }
        }

        if (data.type === "redirect") {
            if (!redirected) {  // 👈 ПРОВЕРЯЕМ ФЛАГ
                redirected = true;
                window.location.href = data.url;
                return;  // 👈 ВЫХОДИМ
            }
        }

        if (data.type === "waiting") {
        document.getElementById("answersBox").style.display = "none";
        document.getElementById("waitingBox").style.display = "block";
        }

        if (data.type === "show_answer_chart") {
            if (timerInterval) clearInterval(timerInterval);
            waitingBox.style.display = "none";
            
            const maxVotes = Math.max(...data.chart_data.map(d => d.votes), 1);
            answersBox.innerHTML = `
                <h2 style="color: #4CAF50; font-size: 24px; text-align: center; margin-bottom: 30px;">Правильний варіант: ${data.correct_option}</h2>
                <div style="display: flex; justify-content: center; align-items: flex-end; height: 150px; gap: 15px; margin-top: 20px; border-bottom: 2px solid rgba(255,255,255,0.5); padding-bottom: 10px;">
                    ${data.chart_data.map(opt => `
                        <div style="display: flex; flex-direction: column; align-items: center; width: 80px;">
                            <div style="font-size: 20px; margin-bottom: 5px;">${opt.votes}</div>
                            <div style="width: 50px; height: ${Math.max((opt.votes / maxVotes) * 120, 5)}px; background: ${opt.is_correct ? '#4CAF50' : '#ff69b4'}; border-radius: 5px 5px 0 0; transition: height 0.5s;"></div>
                            <div style="margin-top: 10px; font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;">${opt.text}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            answersBox.style.display = "block";
            document.querySelector('.question-section').style.display = "none";
        }

        if (data.type === "show_leaderboard") {
            answersBox.innerHTML = `
                <h2 style="text-align: center; margin-bottom: 20px;">Проміжні результати</h2>
                <ul style="list-style: none; padding: 0; max-width: 400px; margin: 0 auto;">
                    ${data.leaderboard.map((p, i) => `
                        <li style="background: ${p.name === playerName ? 'rgba(76, 175, 80, 0.3)' : 'rgba(255,255,255,0.1)'}; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; border: ${p.name === playerName ? '2px solid #4CAF50' : 'none'};">
                            <span>${i+1}. ${p.name} ${p.name === playerName ? '(Ви)' : ''}</span>
                            <span>${p.correct} очків</span>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        if (data.type === "show_final_results") {
            showResults(data.results);
        }

        if (data.type === "answers_count") {
            document.getElementById("answerCounter").innerText =
                `${data.answered} / ${data.total}`;
        }

        if (data.type === "time_up") {
            // Time is up, show message but allow answering
            if (timerInterval) clearInterval(timerInterval);
            timerDisplay.innerText = "Время вышло!";
        }
    };

    function sendAnswer(option_id) {
        if (socket.readyState !== WebSocket.OPEN) return;

        socket.send(JSON.stringify({
            type: "answer",
            option_id: option_id
        }));

        // ховаємо кнопки
        document.getElementById("answersBox").style.display = "none";

        // показуємо очікування
        document.getElementById("waitingBox").style.display = "block";
    }

    function showWaiting() {
        document.getElementById("answersBox").style.display = "none";
        document.getElementById("waitingBox").style.display = "block";
    }

    function startTimer(timeLimit) {
        if (timerInterval) clearInterval(timerInterval);
        let timeLeft = timeLimit;
        timerDisplay.innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.innerText = "Время вышло!";
                // Allow answering even after time up
            }
        }, 1000);
    }

    function showResults(results) {
        if (timerInterval) clearInterval(timerInterval);
        waitingBox.style.display = "none";
        resultsBox.style.display = "flex";
        resultsTable.innerHTML = "";

        results.forEach(r => {
            const tr = document.createElement("tr");
            let nameCell = r.name;
            if (r.name === playerName) {
                nameCell = "(Вы) " + r.name;
            }
            tr.innerHTML = `<td>${nameCell}</td><td>${r.correct}/${r.total}</td>`;
            resultsTable.appendChild(tr);
        });
    }
});
</script>
</body>
</html>
