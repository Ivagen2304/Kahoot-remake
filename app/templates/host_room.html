{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лоббі хоста - Kahoot-remake</title>
    <link rel="icon" type="image/ico+xml" href="https://assets-cdn.kahoot.it/controller/v2/favicon.ico" />
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url("{% static 'Home_bg.png' %}");
            background-size: cover;
            background-position: center;
            font-family: 'Nunito', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lobby-container {
            background-color: rgba(0, 0, 0, 0.514);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .lobby-container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #8a2be2, #764ba2, #ffffff71, #764ba2, #8a2be2);
            border-radius: 25px;
            z-index: -1;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #8a2be2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-code {
            font-size: 36px;
            font-weight: bold;
            color: #ff69b4;
            margin-bottom: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            display: inline-block;
            letter-spacing: 5px;
        }

        .players-section {
            margin-bottom: 30px;
        }

        .players-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #8a2be2;
        }

        #players {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        #players.waiting {
            max-height: none;
            overflow-y: visible;
        }

        #players li {
            background-color: rgba(138, 43, 226, 0.1);
            margin: 5px 0;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 18px;
            transition: background-color 0.3s;
        }

        #players li:hover {
            background-color: rgba(138, 43, 226, 0.2);
        }

        #players li.pulse {
            background-color: transparent;
            padding: 0;
            margin: 0;
            color: #ff69b4;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .start-btn {
            background: linear-gradient(45deg, #8a2be2, #ff69b4);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        }

        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #question {
            margin-top: 30px;
            font-size: 24px;
            color: #8a2be2;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="lobby-container">
        <h1>Лоббі хоста</h1>
        <div class="game-code">{{ session.code }}</div>

        <div class="players-section">
            <!-- 👉 Стилізований лічильник для хоста -->
            <div style="margin-bottom: 20px;">
                <div style="font-size: 18px; background: rgba(255, 255, 255, 0.1); display: inline-block; padding: 8px 25px; border-radius: 50px; border: 1px solid rgba(138, 43, 226, 0.3); color: #ff69b4; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                    Учасників: <span id="hostPlayerCount" style="color: white; font-size: 22px;">0</span>
                </div>
            </div>
            <div class="players-title" id="playersTitle">Список гравців:</div>
            <ul id="players">
                {% for player in session.players.all %}
                    <li>{{ player.name }}</li>
                {% empty %}
                    <li class="pulse">Очікуємо гравців...</li>
                {% endfor %}
            </ul>
        </div>

        {% if request.user == session.host %}
            <button type="button" class="start-btn" onclick="onStartClick()" id="startBtn">Почати гру</button>
        {% endif %}

        <div id="question"></div>
    </div>

<script>
window.addEventListener("load", () => {
    const code = "{{ session.code }}";  // Переконайся, що це не порожнє
    const playerName = "{{ request.user.username|default:'Host' }}";
    const isHost = {% if request.user == session.host %}true{% else %}false{% endif %};
    const startBtn = document.getElementById("startBtn"); // твоя кнопка
    const nameInput = document.getElementById("nameInput"); // поле для імені
    const playersList = document.getElementById("players"); // ul для гравців
    const questionBox = document.getElementById("question"); // div або p для питання

    let playersInLobby = [];

    // Створюємо WebSocket
    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/game/" + code + "/?name=" + encodeURIComponent(playerName) + "&role=host"
    );


    // Коли підключення відкрите
    socket.onopen = () => {
        console.log("WebSocket connected");
        if(startBtn) startBtn.disabled = false; // Кнопка активна тільки після підключення
    };

    // Обробка повідомлень від сервера
    socket.onmessage = function (event) {
    console.log("RAW MESSAGE:", event.data);

    const data = JSON.parse(event.data);
    console.log("PARSED:", data);

    if (data.type === "players") {
        playersInLobby = data.players; // ← ОЦЕ ГОЛОВНЕ
        console.log("Players in lobby:", playersInLobby.length);
        
        // Оновлюємо лічильник
        const hostCountSpan = document.getElementById("hostPlayerCount");
        if (hostCountSpan) {
            hostCountSpan.innerText = data.players.length;
        }
    }

        if(data.type === "players" && playersList) {
            playersList.innerHTML = "";
            const playersTitle = document.getElementById("playersTitle");
            if (data.players.length === 0) {
                playersList.classList.add("waiting");
                const li = document.createElement("li");
                li.textContent = "Очікуємо гравців...";
                li.className = "pulse";
                playersList.appendChild(li);
                if (playersTitle) playersTitle.style.display = "none";
            } else {
                playersList.classList.remove("waiting");
                data.players.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    if (isHost) {
                        const btn = document.createElement("button");
                        btn.textContent = "X";
                        btn.style.background = "red";
                        btn.style.color = "white";
                        btn.style.border = "none";
                        btn.style.padding = "2px 5px";
                        btn.style.cursor = "pointer";
                        btn.style.float = "right";
                        btn.onclick = () => kickPlayer(name);
                        li.appendChild(btn);
                    }
                    playersList.appendChild(li);
                });
                if (playersTitle) playersTitle.style.display = "block";
            }
        }


        if(data.type === "game_started") {
            console.log("GAME STARTED");
        }

        if (data.type === "question") {
            // Hide lobby
            document.querySelector(".players-section").style.display = "none";
            document.querySelector(".game-code").style.display = "none";
            if (startBtn) startBtn.style.display = "none";

            currentPhase = "question";
            questionBox.innerHTML = `
                <h2>${data.question}</h2>
                <div style="font-size: 30px; margin: 20px 0;" id="timerDisplay">${data.time_limit}</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;" id="optionsGrid">
                    ${data.options.map(opt => `<div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 10px;">${opt.text}</div>`).join('')}
                </div>
                <div style="margin-top: 30px;">
                    <button class="start-btn" style="background: #ff69b4; font-size: 18px; padding: 10px 20px;" onclick="skipQuestion()">Пропустити питання</button>
                </div>
            `;
            startHostTimer(data.time_limit);
        }

        if (data.type === "show_answer_chart") {
            if (hostTimerInterval) clearInterval(hostTimerInterval);
            currentPhase = "chart";
            const maxVotes = Math.max(...data.chart_data.map(d => d.votes), 1);
            
            questionBox.innerHTML = `
                <h2 style="color: #4CAF50;">Правильний варіант: ${data.correct_option}</h2>
                <div style="display: flex; justify-content: center; align-items: flex-end; height: 200px; gap: 20px; margin-top: 40px; border-bottom: 2px solid white; padding-bottom: 10px;">
                    ${data.chart_data.map(opt => `
                        <div style="display: flex; flex-direction: column; align-items: center; width: 100px;">
                            <div style="font-size: 24px; margin-bottom: 5px;">${opt.votes}</div>
                            <div style="width: 60px; height: ${Math.max((opt.votes / maxVotes) * 150, 5)}px; background: ${opt.is_correct ? '#4CAF50' : '#ff69b4'}; border-radius: 5px 5px 0 0; transition: height 0.5s;"></div>
                            <div style="margin-top: 10px; font-size: 14px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;">${opt.text}</div>
                        </div>
                    `).join('')}
                </div>
                <button class="start-btn" style="margin-top: 40px;" onclick="nextPhase()">Далі</button>
            `;
        }

        if (data.type === "show_leaderboard") {
            currentPhase = "leaderboard";
            const btnText = data.is_last_question ? "Показати результати" : "Наступне питання";
            questionBox.innerHTML = `
                <h2>Таблиця лідерів (Топ 5)</h2>
                <ul style="list-style: none; padding: 0; max-width: 400px; margin: 30px auto;">
                    ${data.leaderboard.map((p, i) => `
                        <li style="background: ${i === 0 ? 'linear-gradient(45deg, #ffd700, #ffa500)' : 'rgba(255,255,255,0.1)'}; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold;">
                            <span>${i+1}. ${p.name}</span>
                            <span>${p.correct}</span>
                        </li>
                    `).join('')}
                </ul>
                <button class="start-btn" style="margin-top: 20px;" onclick="nextPhase()">${btnText}</button>
            `;
        }

        if (data.type === "show_final_results") {
            questionBox.innerHTML = `
                <h1 style="color: #ffd700; font-size: 60px;">Гру завершено!</h1>
                <h2>Фінальна таблиця лідерів</h2>
                <ul style="list-style: none; padding: 0; max-width: 400px; margin: 30px auto;">
                    ${data.results.map((p, i) => `
                        <li style="background: ${i === 0 ? 'linear-gradient(45deg, #ffd700, #ffa500)' : 'rgba(255,255,255,0.1)'}; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold;">
                            <span>${i+1}. ${p.name}</span>
                            <span>${p.correct}</span>
                        </li>
                    `).join('')}
                </ul>
                <a href="/" style="display: inline-block; margin-top: 30px; background: #4CAF50; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 20px;">Завершити</a>
            `;
        }
    };

    let hostTimerInterval;
    let currentPhase = "lobby";

    function startHostTimer(timeLimit) {
        if (hostTimerInterval) clearInterval(hostTimerInterval);
        let timeLeft = timeLimit;
        const display = document.getElementById("timerDisplay");
        hostTimerInterval = setInterval(() => {
            timeLeft--;
            if (display) display.innerText = timeLeft;
            if (timeLeft <= 0) clearInterval(hostTimerInterval);
        }, 1000);
    }

    window.nextPhase = function() {
        socket.send(JSON.stringify({ type: "next_phase", current_phase: currentPhase }));
    };

    window.skipQuestion = function() {
        socket.send(JSON.stringify({ type: "skip_question" }));
    };

    socket.onclose = () => console.log("WebSocket CLOSED");
    socket.onerror = (e) => console.error("WebSocket ERROR", e);

    // Функція старту гри (глобальна)
    window.startGame = function() {
        if(!socket || socket.readyState !== WebSocket.OPEN) {
            console.log("WebSocket not open yet");
            return;
        }

        console.log("START GAME CLICK");
        socket.send(JSON.stringify({ type: "start_game" }));
    };

    window.onStartClick = function () {
        if (!playersInLobby || playersInLobby.length < 1) {
            alert("Недостатня кількість гравців для початку (мінімальна кількість 1)");
            return;
        }

        startGame();
        console.log("GAME STARTED");
    };

    window.kickPlayer = function (playerName) {
        if(!socket || socket.readyState !== WebSocket.OPEN) {
            console.log("WebSocket not open yet");
            return;
        }

        socket.send(JSON.stringify({
            type: "kick_player",
            player_name: playerName
        }));
    };
});
</script>
</body>
</html>
