{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Лоббі гравця - Kahoot-remake</title>
    <link rel="icon" type="image/ico+xml" href="https://assets-cdn.kahoot.it/controller/v2/favicon.ico" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 5, 25, 0.4), rgba(0, 5, 25, 0.4)), url("{% static 'Home_bg.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Nunito', Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .lobby-container {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1;
        }

        .lobby-container::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 34px;
            padding: 4px;
            background: linear-gradient(45deg, #8a2be2, #ff69b4, #ffffff71, #ff69b4, #8a2be2);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            background-size: 200% 200%;
            animation: borderRotate 4s linear infinite;
            z-index: -1;
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #8a2be2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-code {
            font-size: 36px;
            font-weight: bold;
            color: #ff69b4;
            margin-bottom: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            display: inline-block;
            letter-spacing: 5px;
        }

        .waiting-message {
            font-size: 24px;
            margin-bottom: 30px;
            color: #8a2be2;
        }

        #question {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #8a2be2;
            display: none;
        }

        #answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .answer-btn {
            background: linear-gradient(45deg, #8a2be2, #ff69b4);
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .answer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="lobby-container">
        <h1>Лоббі гравця</h1>
        <div class="game-code">{{ session.code }}</div>

        <!-- 👉 Стилізований лічильник гравців (тепер під кодом) -->
        <div style="margin-bottom: 30px;">
            <div
                style="font-size: 18px; background: rgba(255, 255, 255, 0.1); display: inline-block; padding: 8px 25px; border-radius: 50px; border: 1px solid rgba(138, 43, 226, 0.3); color: #ff69b4; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                Гравців у лоббі: <span id="playerCount" style="color: white; font-size: 22px;">0</span>
            </div>
        </div>

        <div class="waiting-message pulse">Очікуємо початку гри...</div>
        <div id="question"></div>
        <div id="answers"></div>
    </div>

    <script>
        const code = "{{ session.code }}";
        let storedName = sessionStorage.getItem("player_name") || localStorage.getItem("player_name");
        const playerName = "{{ player_name|default:'' }}" || (storedName && storedName !== "null" ? storedName : null) || "Player";
        sessionStorage.setItem("player_name", playerName);

        const socket = new WebSocket(
            "ws://" + window.location.host +
            "/ws/game/" + code + "/?name=" + encodeURIComponent(playerName) + "&role=player"
        );

        socket.onopen = () =>
            console.log("WebSocket connected");
        socket.onerror = (e) =>
            console.error("WebSocket ERROR", e);

        socket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === "players") {
                const playerCountSpan = document.getElementById("playerCount");
                if (playerCountSpan) {
                    playerCountSpan.innerText = data.players.length;
                }
            }

            if (data.type === "lobby_disbanded") {
                document.querySelector(".lobby-container").innerHTML = `
            <h1 style="color: #ff69b4;">Лоббі розпущено</h1>
            <div class="waiting-message">${data.message}</div>
            <p style="font-size: 18px; opacity: 0.8;">Повернення на головну сторінку...</p>
        `;
                setTimeout(() => {
                    window.location.href = "/";
                }, 3000);
            }

            if (data.type === "show_question") {
                // Скрываем сообщение ожидания
                document.querySelector(".waiting-message").style.display = "none";

                // Показываем вопрос
                const questionDiv = document.getElementById("question");
                questionDiv.innerText = data.question;
                questionDiv.style.display = "block";

                // Показываем варианты ответов
                const answersDiv = document.getElementById("answers");
                answersDiv.innerHTML = "";

                data.options.forEach(option => {
                    const btn = document.createElement("button");
                    btn.innerText = option.text;
                    btn.className = "answer-btn";
                    btn.onclick = () => sendAnswer(option.id);
                    answersDiv.appendChild(btn);
                });

                // Показываем кнопки ответов
                document.querySelectorAll(".answer-btn").forEach(btn => {
                    btn.style.display = "block";
                });
            }

            if (data.type === "redirect") {
                window.location.href = data.url;
            }

            if (data.type === "kicked") {
                document.querySelector(".lobby-container").innerHTML = `
            <h1 style="color: #ff69b4;">Вас вигнали</h1>
            <div class="waiting-message">${data.message}</div>
            <p style="font-size: 18px; opacity: 0.8;">Повернення на головну сторінку через 3 секунди...</p>
        `;
                setTimeout(() => {
                    window.location.href = "/";
                }, 3000);
            }
        };

        function sendAnswer(optionId) {
            socket.send(JSON.stringify({
                type: "answer",
                option_id: optionId
            }));
        }
    </script>
</body>

</html>
